<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#0f0f0f; font-family: 'JetBrains Mono', monospace;">

  <!-- Grid lines -->
  <line x1="60" y1="40"  x2="760" y2="40"  stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="104" x2="760" y2="104" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="168" x2="760" y2="168" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="232" x2="760" y2="232" stroke="#2e1a1a" stroke-width="1"/>
  <line x1="60" y1="296" x2="760" y2="296" stroke="#1a2e2e" stroke-width="1"/>
  <line x1="60" y1="360" x2="760" y2="360" stroke="#1f1f1f" stroke-width="1"/>

  <!-- $80k support broken (dashed red) -->
  <line x1="60" y1="232" x2="760" y2="232" stroke="#5a2222" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- $63k EMA resistance (dashed amber) -->
  <line x1="490" y1="286" x2="760" y2="286" stroke="#7a5a00" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- $57.5k next support (dashed dark green) -->
  <line x1="490" y1="304" x2="760" y2="304" stroke="#2a3a2a" stroke-width="1" stroke-dasharray="2,6"/>

  <!-- Y axis labels -->
  <text x="50" y="44"  fill="#555" font-size="11" text-anchor="end">$140k</text>
  <text x="50" y="108" fill="#555" font-size="11" text-anchor="end">$120k</text>
  <text x="50" y="172" fill="#555" font-size="11" text-anchor="end">$100k</text>
  <text x="50" y="236" fill="#7a3030" font-size="11" text-anchor="end">$80k</text>
  <text x="50" y="300" fill="#3d8fa3" font-size="11" text-anchor="end">$60k</text>
  <text x="50" y="364" fill="#555" font-size="11" text-anchor="end">$40k</text>

  <defs>
    <linearGradient id="bullFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8e8e8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e8e8e8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bearFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#cc3333" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#cc3333" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="emaFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a5a00" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7a5a00" stop-opacity="0.01"/>
    </linearGradient>
  </defs>

  <!-- Bull tail area (Oct–Dez/25) -->
  <path d="
    M 60,136
    L 100,85 L 130,100 L 170,115 L 216,136
    L 216,360 L 60,360 Z
  " fill="url(#bullFade)"/>

  <!-- Bear phase area (Dez/25–Jun/26) -->
  <path d="
    M 216,136
    L 294,182 L 372,220 L 420,232 L 460,244
    L 528,262 L 606,278 L 650,285 L 720,292 L 760,296
    L 760,360 L 216,360 Z
  " fill="url(#bearFade)"/>

  <!-- EMA resistance zone shading -->
  <rect x="490" y="232" width="270" height="54" fill="url(#emaFade)"/>

  <!-- Bull tail price line (gray) -->
  <polyline
    fill="none"
    stroke="#e8e8e8"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    points="60,136 100,85 130,100 170,115 216,136"
  />

  <!-- Bear phase price line (red) -->
  <polyline
    fill="none"
    stroke="#cc3333"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"
    points="216,136 294,182 372,220 420,232 460,244 528,262 606,278 650,285 720,292 760,296"
  />

  <!-- Bear phase start vertical -->
  <line x1="216" y1="40" x2="216" y2="360" stroke="#cc3333" stroke-width="1" stroke-dasharray="3,4" stroke-opacity="0.25"/>

  <!-- Peak marker (Out/25) -->
  <circle cx="100" cy="85" r="4" fill="#e8e8e8"/>
  <line x1="100" y1="85" x2="100" y2="58" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="104" y="55" fill="#aaa" font-size="9">pico $126k · out/25</text>

  <!-- $80k support broken marker -->
  <circle cx="420" cy="232" r="4" fill="#cc3333" fill-opacity="0.85"/>
  <text x="425" y="228" fill="#aa3333" font-size="9">$80k rompido</text>

  <!-- ETF outflow annotation -->
  <text x="295" y="55" fill="#885533" font-size="9">saídas ETF: $4,4B em 13 dias →</text>

  <!-- EMA resistance zone label -->
  <text x="493" y="270" fill="#8a6a10" font-size="9">resistência EMAs 20/50/100</text>

  <!-- $57.5k support label -->
  <text x="493" y="318" fill="#3a5a3a" font-size="9">próx. suporte $57,5k</text>

  <!-- Current price marker (Jun/26) -->
  <circle cx="760" cy="296" r="5" fill="#3d8fa3" stroke="#0f0f0f" stroke-width="1.5"/>
  <text x="765" y="292" fill="#3d8fa3" font-size="9" text-anchor="start">$60k</text>

  <!-- NFP event marker -->
  <line x1="760" y1="250" x2="760" y2="265" stroke="#3d8fa3" stroke-width="1" stroke-opacity="0.5"/>
  <text x="745" y="248" fill="#3d8fa3" font-size="8" text-anchor="end">NFP</text>

  <!-- Downward arrow -->
  <line x1="640" y1="170" x2="640" y2="235" stroke="#cc3333" stroke-width="1.5" stroke-opacity="0.55"/>
  <polygon points="640,244 635,229 645,229" fill="#cc3333" fill-opacity="0.55"/>
  <text x="643" y="207" fill="#884444" font-size="9">−52%</text>

  <!-- Fear & Greed + RSI -->
  <text x="64" y="350" fill="#cc3333" font-size="9">fear &amp; greed: 11</text>
  <text x="64" y="362" fill="#666"    font-size="9">RSI diário: 18</text>

  <!-- X axis labels -->
  <text x="60"  y="378" fill="#555" font-size="10" text-anchor="middle">Out/25</text>
  <text x="138" y="378" fill="#555" font-size="10" text-anchor="middle">Nov/25</text>
  <text x="216" y="378" fill="#555" font-size="10" text-anchor="middle">Dez/25</text>
  <text x="294" y="378" fill="#555" font-size="10" text-anchor="middle">Jan/26</text>
  <text x="372" y="378" fill="#555" font-size="10" text-anchor="middle">Fev/26</text>
  <text x="450" y="378" fill="#555" font-size="10" text-anchor="middle">Mar/26</text>
  <text x="528" y="378" fill="#555" font-size="10" text-anchor="middle">Abr/26</text>
  <text x="606" y="378" fill="#555" font-size="10" text-anchor="middle">Mai/26</text>
  <text x="720" y="378" fill="#555" font-size="10" text-anchor="middle">Jun/26</text>

  <!-- Axis lines -->
  <line x1="60" y1="40"  x2="60"  y2="360" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="360" x2="760" y2="360" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="22" fill="#666" font-size="11" letter-spacing="2">BTC/USD — queda de $126k a $60k · Out/2025–Jun/2026</text>

</svg>
