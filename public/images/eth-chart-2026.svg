<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#0f0f0f; font-family: 'JetBrains Mono', monospace;">

  <!-- Grid lines -->
  <line x1="60" y1="40"  x2="760" y2="40"  stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="110" x2="760" y2="110" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="180" x2="760" y2="180" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="250" x2="760" y2="250" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="320" x2="760" y2="320" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="50" y="44"  fill="#555" font-size="11" text-anchor="end">$6k</text>
  <text x="50" y="114" fill="#555" font-size="11" text-anchor="end">$4.5k</text>
  <text x="50" y="184" fill="#555" font-size="11" text-anchor="end">$3k</text>
  <text x="50" y="254" fill="#555" font-size="11" text-anchor="end">$1.5k</text>
  <text x="50" y="324" fill="#555" font-size="11" text-anchor="end">$0</text>

  <defs>
    <linearGradient id="ethGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7c6dfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c6dfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Area fill -->
  <path d="
    M 60,295
    L 100,280 L 140,260 L 175,240 L 210,215
    L 245,165 L 270,185 L 305,195
    L 340,175 L 375,155 L 410,130
    L 445,108 L 480,118 L 510,125
    L 540,112 L 570,105 L 600,115
    L 630,120 L 665,110 L 700,118
    L 730,125 L 760,122
    L 760,360 L 60,360 Z
  " fill="url(#ethGrad)"/>

  <!-- Price line -->
  <polyline
    fill="none"
    stroke="#7c6dfa"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    points="
      60,295
      100,280
      140,260
      175,240
      210,215
      245,165
      270,185
      305,195
      340,175
      375,155
      410,130
      445,108
      480,118
      510,125
      540,112
      570,105
      600,115
      630,120
      665,110
      700,118
      730,125
      760,122
    "
  />

  <!-- ETF approval marker -->
  <circle cx="245" cy="165" r="4" fill="#7c6dfa"/>
  <line x1="245" y1="165" x2="245" y2="135" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="248" y="131" fill="#888" font-size="9">ETF ETH</text>

  <!-- Merge anniversary / staking milestone -->
  <circle cx="410" cy="130" r="4" fill="#7c6dfa"/>
  <line x1="410" y1="130" x2="410" y2="100" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="365" y="96" fill="#888" font-size="9">staking yield</text>

  <!-- ATH marker -->
  <circle cx="570" cy="105" r="5" fill="#fff" stroke="#7c6dfa" stroke-width="1.5"/>
  <text x="530" y="96" fill="#aaa" font-size="9">ATH ~$4.8k</text>

  <!-- Deflation zone annotation -->
  <rect x="490" y="44" width="130" height="16" rx="2" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="555" y="55" fill="#7c6dfa" font-size="8" text-anchor="middle" letter-spacing="1">deflação episódica</text>

  <!-- X axis labels -->
  <text x="60"  y="378" fill="#555" font-size="10" text-anchor="middle">Jan/23</text>
  <text x="175" y="378" fill="#555" font-size="10" text-anchor="middle">Jun/23</text>
  <text x="290" y="378" fill="#555" font-size="10" text-anchor="middle">Jan/24</text>
  <text x="415" y="378" fill="#555" font-size="10" text-anchor="middle">Jul/24</text>
  <text x="530" y="378" fill="#555" font-size="10" text-anchor="middle">Jan/25</text>
  <text x="648" y="378" fill="#555" font-size="10" text-anchor="middle">Jun/25</text>
  <text x="760" y="378" fill="#555" font-size="10" text-anchor="middle">2026</text>

  <!-- Axis lines -->
  <line x1="60" y1="40" x2="60" y2="360" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="360" x2="760" y2="360" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="22" fill="#666" font-size="11" letter-spacing="2">ETH/USD — ciclo 2023–2026</text>

</svg>
