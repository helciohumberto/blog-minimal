<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" style="background:#0f0f0f; font-family: 'JetBrains Mono', monospace;">

  <!-- Title -->
  <text x="400" y="26" fill="#333" font-size="9" letter-spacing="2" text-anchor="middle">PRIMITIVAS DO DeFi</text>

  <!-- ── Smart Contract base ── -->
  <rect x="280" y="290" width="240" height="44" rx="4" fill="#111" stroke="#1f2e1f" stroke-width="1"/>
  <text x="400" y="308" fill="#3d8fa3" font-size="10" text-anchor="middle" letter-spacing="1">SMART CONTRACT</text>
  <text x="400" y="324" fill="#555" font-size="8" text-anchor="middle">execução automática · sem intermediário</text>

  <!-- ── Blockchain base ── -->
  <rect x="310" y="318" width="180" height="0" rx="0" fill="none"/>

  <!-- Vertical lines up from smart contract -->
  <line x1="340" y1="290" x2="140" y2="200" stroke="#1f2e1f" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="400" y1="290" x2="400" y2="200" stroke="#1f2e1f" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="460" y1="290" x2="660" y2="200" stroke="#1f2e1f" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- ── LENDING box ── -->
  <rect x="40" y="130" width="200" height="68" rx="4" fill="#1a1a1a" stroke="#2a3a2a" stroke-width="1"/>
  <text x="140" y="150" fill="#888" font-size="10" text-anchor="middle" letter-spacing="1">LENDING</text>
  <text x="140" y="167" fill="#555" font-size="8" text-anchor="middle">colateral → empréstimo</text>
  <text x="140" y="181" fill="#555" font-size="8" text-anchor="middle">juros por algoritmo</text>
  <text x="140" y="195" fill="#3d8fa3" font-size="8" text-anchor="middle">Aave · Compound</text>

  <!-- ── DEX box ── -->
  <rect x="300" y="130" width="200" height="68" rx="4" fill="#1a1a1a" stroke="#2a3a2a" stroke-width="1"/>
  <text x="400" y="150" fill="#888" font-size="10" text-anchor="middle" letter-spacing="1">DEX</text>
  <text x="400" y="167" fill="#555" font-size="8" text-anchor="middle">pool de liquidez</text>
  <text x="400" y="181" fill="#3d8fa3" font-size="8" text-anchor="middle">x · y = k</text>
  <text x="400" y="195" fill="#555" font-size="8" text-anchor="middle">Uniswap · Curve</text>

  <!-- ── STABLECOIN box ── -->
  <rect x="560" y="130" width="200" height="68" rx="4" fill="#1a1a1a" stroke="#2a3a2a" stroke-width="1"/>
  <text x="660" y="150" fill="#888" font-size="10" text-anchor="middle" letter-spacing="1">STABLECOIN</text>
  <text x="660" y="167" fill="#555" font-size="8" text-anchor="middle">over-collateralization</text>
  <text x="660" y="181" fill="#555" font-size="8" text-anchor="middle">peg algorítmico</text>
  <text x="660" y="195" fill="#3d8fa3" font-size="8" text-anchor="middle">DAI · Maker</text>

  <!-- ── User node ── -->
  <rect x="330" y="46" width="140" height="44" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="400" y="64" fill="#888" font-size="10" text-anchor="middle">VOCÊ</text>
  <text x="400" y="80" fill="#555" font-size="8" text-anchor="middle">carteira · sem aprovação</text>

  <!-- Arrows from user to primitives -->
  <line x1="370" y1="90" x2="180" y2="128" stroke="#2a3a2a" stroke-width="1"/>
  <polygon points="180,124 172,134 184,134" fill="#2a3a2a"/>

  <line x1="400" y1="90" x2="400" y2="128" stroke="#2a3a2a" stroke-width="1"/>
  <polygon points="396,124 400,134 404,124" fill="#2a3a2a"/>

  <line x1="430" y1="90" x2="620" y2="128" stroke="#2a3a2a" stroke-width="1"/>
  <polygon points="616,124 624,124 616,134" fill="#2a3a2a"/>

  <!-- Risk indicators -->
  <text x="40" y="220" fill="#5a3a3a" font-size="8">⚠ liquidação automática</text>
  <text x="300" y="220" fill="#5a3a3a" font-size="8">⚠ slippage · impermanent loss</text>
  <text x="560" y="220" fill="#5a3a3a" font-size="8">⚠ risco de oracle</text>

  <!-- Bottom label -->
  <text x="400" y="352" fill="#2a2a2a" font-size="8" text-anchor="middle" letter-spacing="1">blockchain pública · código aberto · sem permissão</text>

</svg>
