<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#0f0f0f; font-family: 'JetBrains Mono', monospace;">

  <!-- Grid lines -->
  <line x1="60" y1="40"  x2="760" y2="40"  stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="110" x2="760" y2="110" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="180" x2="760" y2="180" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="250" x2="760" y2="250" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="320" x2="760" y2="320" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="50" y="44"  fill="#555" font-size="11" text-anchor="end">$110k</text>
  <text x="50" y="114" fill="#555" font-size="11" text-anchor="end">$85k</text>
  <text x="50" y="184" fill="#555" font-size="11" text-anchor="end">$60k</text>
  <text x="50" y="254" fill="#555" font-size="11" text-anchor="end">$35k</text>
  <text x="50" y="324" fill="#555" font-size="11" text-anchor="end">$10k</text>

  <!-- Area fill under the line -->
  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8e8e8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e8e8e8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Area path (same points as line, closed at bottom) -->
  <path d="
    M 60,310
    L 120,270 L 175,230 L 200,220
    L 240,190 L 265,100
    L 290,140 L 330,155 L 355,115
    L 395,135 L 430,125
    L 470,88  L 500,72
    L 530,95  L 560,100
    L 590,82  L 620,70
    L 650,62  L 680,68
    L 710,75  L 740,80  L 760,85
    L 760,360 L 60,360 Z
  " fill="url(#areaGrad)"/>

  <!-- Price line -->
  <polyline
    fill="none"
    stroke="#e8e8e8"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    points="
      60,310
      120,270
      175,230
      200,220
      240,190
      265,100
      290,140
      330,155
      355,115
      395,135
      430,125
      470,88
      500,72
      530,95
      560,100
      590,82
      620,70
      650,62
      680,68
      710,75
      740,80
      760,85
    "
  />

  <!-- Key event markers -->

  <!-- ETF approval Jan 2024 -->
  <circle cx="240" cy="190" r="4" fill="#e8e8e8"/>
  <line x1="240" y1="190" x2="240" y2="155" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="243" y="150" fill="#888" font-size="9">ETF</text>

  <!-- Halving Apr 2024 -->
  <circle cx="310" cy="148" r="4" fill="#e8e8e8"/>
  <line x1="310" y1="148" x2="310" y2="115" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="295" y="110" fill="#888" font-size="9">halving</text>

  <!-- ATH Mar 2024 -->
  <circle cx="265" cy="100" r="5" fill="#fff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="215" y="92" fill="#aaa" font-size="9">ATH $73k</text>

  <!-- $100k milestone Dec 2024 -->
  <circle cx="620" cy="70" r="4" fill="#e8e8e8"/>
  <line x1="620" y1="70" x2="620" y2="48" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="590" y="44" fill="#888" font-size="9">$100k+</text>

  <!-- X axis labels -->
  <text x="60"  y="375" fill="#555" font-size="10" text-anchor="middle">Jan/23</text>
  <text x="175" y="375" fill="#555" font-size="10" text-anchor="middle">Jun/23</text>
  <text x="290" y="375" fill="#555" font-size="10" text-anchor="middle">Jan/24</text>
  <text x="415" y="375" fill="#555" font-size="10" text-anchor="middle">Jul/24</text>
  <text x="530" y="375" fill="#555" font-size="10" text-anchor="middle">Jan/25</text>
  <text x="650" y="375" fill="#555" font-size="10" text-anchor="middle">Jun/25</text>
  <text x="760" y="375" fill="#555" font-size="10" text-anchor="middle">2026</text>

  <!-- Axis lines -->
  <line x1="60" y1="40" x2="60" y2="360" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="360" x2="760" y2="360" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="22" fill="#666" font-size="11" letter-spacing="2">BTC/USD — ciclo 2023–2026</text>

</svg>
