<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#0f0f0f; font-family: 'JetBrains Mono', monospace;">

  <!-- Grid lines -->
  <line x1="60" y1="40"  x2="760" y2="40"  stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="120" x2="760" y2="120" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="200" x2="760" y2="200" stroke="#2e1a1a" stroke-width="1"/>
  <line x1="60" y1="280" x2="760" y2="280" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="60" y1="360" x2="760" y2="360" stroke="#1f1f1f" stroke-width="1"/>

  <!-- $80k support line highlighted -->
  <line x1="60" y1="200" x2="760" y2="200" stroke="#5a2222" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Y axis labels -->
  <text x="50" y="44"  fill="#555" font-size="11" text-anchor="end">$120k</text>
  <text x="50" y="124" fill="#555" font-size="11" text-anchor="end">$100k</text>
  <text x="50" y="204" fill="#7a3030" font-size="11" text-anchor="end">$80k</text>
  <text x="50" y="284" fill="#555" font-size="11" text-anchor="end">$60k</text>
  <text x="50" y="364" fill="#555" font-size="11" text-anchor="end">$40k</text>

  <defs>
    <linearGradient id="bullGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8e8e8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#e8e8e8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="crashGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#cc3333" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#cc3333" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Bull phase area fill -->
  <path d="
    M 60,140
    L 100,120 L 140,100 L 178,120 L 217,152 L 256,136
    L 295,120 L 334,132 L 372,116 L 411,124 L 450,104
    L 489,120 L 527,112 L 566,132
    L 566,360 L 60,360 Z
  " fill="url(#bullGrad)"/>

  <!-- Crash area fill -->
  <path d="
    M 566,132
    L 605,180 L 644,232 L 683,280 L 720,268 L 760,276
    L 760,360 L 566,360 Z
  " fill="url(#crashGrad)"/>

  <!-- Bull phase price line -->
  <polyline
    fill="none"
    stroke="#e8e8e8"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    points="60,140 100,120 140,100 178,120 217,152 256,136 295,120 334,132 372,116 411,124 450,104 489,120 527,112 566,132"
  />

  <!-- Crash price line -->
  <polyline
    fill="none"
    stroke="#cc3333"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"
    points="566,132 605,180 644,232 683,280 720,268 760,276"
  />

  <!-- Crash start vertical line -->
  <line x1="566" y1="40" x2="566" y2="360" stroke="#cc3333" stroke-width="1" stroke-dasharray="3,4" stroke-opacity="0.35"/>

  <!-- Support break marker at ~$80k crossing (x≈620) -->
  <circle cx="620" cy="200" r="4" fill="#cc3333" fill-opacity="0.8"/>
  <text x="625" y="196" fill="#aa3333" font-size="9">suporte rompido</text>

  <!-- Peak marker Nov/25 -->
  <circle cx="450" cy="104" r="4" fill="#e8e8e8"/>
  <line x1="450" y1="104" x2="450" y2="74" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="453" y="70" fill="#aaa" font-size="9">topo ~$104k</text>

  <!-- Crash start label -->
  <text x="570" y="55" fill="#cc3333" font-size="9">início da queda</text>

  <!-- Bottom area label -->
  <circle cx="683" cy="280" r="5" fill="#cc3333" stroke="#e8e8e8" stroke-width="1"/>
  <text x="686" y="297" fill="#888" font-size="9">~$60k</text>

  <!-- Support line label (right side) -->
  <text x="763" y="196" fill="#7a3030" font-size="9" text-anchor="start">$80k</text>

  <!-- Downward arrow during crash -->
  <line x1="614" y1="155" x2="614" y2="220" stroke="#cc3333" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="614,230 609,215 619,215" fill="#cc3333" fill-opacity="0.6"/>

  <!-- X axis labels -->
  <text x="60"  y="378" fill="#555" font-size="10" text-anchor="middle">Jan/25</text>
  <text x="217" y="378" fill="#555" font-size="10" text-anchor="middle">Mai/25</text>
  <text x="372" y="378" fill="#555" font-size="10" text-anchor="middle">Set/25</text>
  <text x="527" y="378" fill="#555" font-size="10" text-anchor="middle">Jan/26</text>
  <text x="683" y="378" fill="#555" font-size="10" text-anchor="middle">Mai/26</text>
  <text x="760" y="378" fill="#555" font-size="10" text-anchor="middle">Jun/26</text>

  <!-- Axis lines -->
  <line x1="60" y1="40" x2="60" y2="360" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="360" x2="760" y2="360" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="22" fill="#666" font-size="11" letter-spacing="2">BTC/USD — derretimento 2026</text>

</svg>
